# nginx для neuro-dropbot.
# 1) Подставь свой домен в server_name (например neurodropbot.duckdns.org).
# 2) Положи как /etc/nginx/sites-available/neuro-dropbot.conf и сделай symlink в sites-enabled.
# 3) Выпусти сертификат:  certbot --nginx -d ДОМЕН
#    (certbot сам добавит блок 443 и редирект с 80).

server {
    listen 80;
    server_name ДОМЕН;   # <-- заменить

    # Вебхук ЮMoney. Защита — проверка SHA-1 подписи в приложении (секрет в .env),
    # поэтому IP-whitelist не нужен (ЮMoney не публикует фиксированный список IP).
    location /yoomoney/webhook {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Страница возврата после оплаты + healthcheck
    location ~ ^/(paid|health)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        return 404;
    }
}
